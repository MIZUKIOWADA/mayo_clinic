name: kuchi_toji_watch
description: On-device Android MVP that alerts when a child's mouth stays open.
publish_to: "none"
version: 0.1.0+1

environment:
  sdk: ">=3.9.0 <4.0.0"

dependencies:
  camera: ^0.12.0+1
  camera_android_camerax: ^0.7.2
  flutter:
    sdk: flutter
  google_mlkit_face_detection: ^0.13.2

dev_dependencies:
  flutter_launcher_icons: ^0.14.4
  flutter_lints: ^6.0.0
  flutter_test:
    sdk: flutter

flutter:
  uses-material-design: true
  assets:
    - assets/brand/app_icon.svg

flutter_launcher_icons:
  android: true
  ios: false
  image_path: "store/icons/app-icon-1024.png"
  remove_alpha_ios: true
  adaptive_icon_background: "#0F1416"
  adaptive_icon_foreground: "store/icons/app-icon-1024.png"
